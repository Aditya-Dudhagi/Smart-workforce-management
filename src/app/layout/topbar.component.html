<mat-toolbar color="primary" class="topbar">
  <span>{{ appName }}</span>

  <form class="global-search" (ngSubmit)="runGlobalSearch()">
    <mat-form-field appearance="outline">
      <mat-label>Search employees</mat-label>
      <input matInput [formControl]="searchControl" placeholder="Name, email, department" />
      <button mat-icon-button matSuffix type="submit" aria-label="Run search">
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>
  </form>

  <span class="spacer"></span>

  <button mat-icon-button [matMenuTriggerFor]="notificationsMenu" aria-label="Notifications">
    <mat-icon [matBadge]="(unreadCount$ | async) || 0" matBadgeColor="warn" matBadgeSize="small">notifications</mat-icon>
  </button>

  <mat-menu #notificationsMenu="matMenu" xPosition="before" class="notifications-menu">
    <ng-container *ngIf="notifications$ | async as notifications">
      <button mat-menu-item disabled *ngIf="notifications.length === 0">No notifications</button>

      <button mat-menu-item *ngFor="let notification of notifications" (click)="markRead(notification.id)">
        <mat-icon>{{ notification.read ? 'drafts' : 'markunread' }}</mat-icon>
        <span>{{ notification.message }}</span>
      </button>

      <mat-divider></mat-divider>
      <button mat-menu-item (click)="markAllRead(notifications)">
        <mat-icon>done_all</mat-icon>
        <span>Mark all read</span>
      </button>
    </ng-container>
  </mat-menu>

  <div class="user-meta" *ngIf="currentUser$ | async as user">
    <mat-icon>account_circle</mat-icon>
    <span>{{ user.username }}</span>
    <span class="role-badge">{{ user.role }}</span>
  </div>

  <button mat-button (click)="logout()">Logout</button>
</mat-toolbar>
