<section class="employee-list-page">
  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search employees</mat-label>
      <input matInput [formControl]="searchControl" placeholder="Name, email, department" />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="dept-field">
      <mat-label>Department</mat-label>
      <mat-select [formControl]="departmentControl">
        <mat-option *ngFor="let dept of departments" [value]="dept">{{ dept }}</mat-option>
      </mat-select>
    </mat-form-field>

    <button mat-raised-button color="primary" *ngIf="isAdminOrHr()" (click)="openAdd()">Add Employee</button>
  </div>

  <mat-card>
    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" matSort class="employee-table">
        <ng-container matColumnDef="avatar">
          <th mat-header-cell *matHeaderCellDef>Avatar</th>
          <td mat-cell *matCellDef="let employee">
            <div class="avatar-wrap">
              <img *ngIf="employee.profilePicture" [src]="employee.profilePicture" [alt]="employee.firstName" />
              <span class="avatar-fallback" *ngIf="!employee.profilePicture">{{ getInitials(employee) }}</span>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
          <td mat-cell *matCellDef="let employee">{{ employee.firstName }} {{ employee.lastName }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let employee">{{ employee.email }}</td>
        </ng-container>

        <ng-container matColumnDef="department">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Department</th>
          <td mat-cell *matCellDef="let employee">{{ employee.department }}</td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let employee">{{ employee.role }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
          <td mat-cell *matCellDef="let employee">
            <span class="status-badge" [ngClass]="employee.status === 'Active' ? 'active' : 'inactive'">{{ employee.status }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let employee">
            <button mat-icon-button color="primary" *ngIf="isAdminOrHr()" (click)="openEdit(employee, $event)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" *ngIf="isAdmin()" (click)="deleteEmployee(employee, $event)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="openProfile(row)"></tr>
      </table>
    </div>

    <mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50]"></mat-paginator>
  </mat-card>
</section>
