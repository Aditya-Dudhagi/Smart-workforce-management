<section class="leave-apply-page">
  <mat-card>
    <h2>Apply Leave</h2>

    <div class="balance-strip">
      <span>Casual: {{ leaveBalance.casual }}</span>
      <span>Sick: {{ leaveBalance.sick }}</span>
      <span>Annual: {{ leaveBalance.annual }}</span>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Leave Type</mat-label>
        <mat-select formControlName="leaveType">
          <mat-option *ngFor="let type of leaveTypes" [value]="type">{{ type }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Start Date</mat-label>
        <input matInput [matDatepicker]="startPicker" formControlName="startDate" />
        <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>End Date</mat-label>
        <input matInput [matDatepicker]="endPicker" formControlName="endDate" />
        <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
        <mat-error *ngIf="form.hasError('endDateBeforeStartDate')">End date must be on or after start date</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="reason-field">
        <mat-label>Reason</mat-label>
        <textarea matInput rows="5" formControlName="reason"></textarea>
        <mat-error *ngIf="form.get('reason')?.touched && form.get('reason')?.hasError('required')">Reason is required</mat-error>
        <mat-error *ngIf="form.get('reason')?.touched && form.get('reason')?.hasError('minlength')">Minimum 20 characters required</mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit">Submit Leave Request</button>
    </form>
  </mat-card>
</section>
