<h2 mat-dialog-title>Reject Leave</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Rejection Note</mat-label>
    <textarea matInput rows="4" [formControl]="noteControl"></textarea>
    <mat-error *ngIf="noteControl?.touched && noteControl?.hasError('required')">
      Note is required
    </mat-error>
    <mat-error *ngIf="noteControl?.touched && noteControl?.hasError('minlength')">
      Minimum 5 characters required
    </mat-error>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Cancel</button>
  <button mat-raised-button color="warn" type="button" (click)="submit()">Reject</button>
</mat-dialog-actions>
