<div class="data-table-wrap">
  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container *ngFor="let column of columns" [matColumnDef]="column.key">
      <th mat-header-cell *matHeaderCellDef [mat-sort-header]="column.key" [disabled]="!column.sortable">
        {{ column.header }}
      </th>

      <td mat-cell *matCellDef="let row">
        <ng-container [ngSwitch]="column.type || 'text'">
          <ng-container *ngSwitchCase="'actions'">
            <button
              mat-icon-button
              *ngFor="let action of column.actions || []"
              [color]="action.color || 'primary'"
              (click)="onActionClick(action.value, row, $event)"
            >
              <mat-icon *ngIf="action.icon">{{ action.icon }}</mat-icon>
              <span *ngIf="!action.icon">{{ action.label }}</span>
            </button>
          </ng-container>

          <ng-container *ngSwitchCase="'badge'">
            <app-badge [text]="getCellValue(row, column.key)" [type]="getBadgeType(row, column.key)"></app-badge>
          </ng-container>

          <ng-container *ngSwitchDefault>
            {{ getCellValue(row, column.key) }}
          </ng-container>
        </ng-container>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumnKeys"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumnKeys" (click)="onRowClick(row)"></tr>
  </table>

  <mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50]"></mat-paginator>
</div>
